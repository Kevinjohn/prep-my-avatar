name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, python: '3.10' }
          - { os: ubuntu-latest, python: '3.11' }
          - { os: ubuntu-latest, python: '3.12' }
          - { os: windows-latest, python: '3.10' }
          - { os: windows-latest, python: '3.11' }
          - { os: windows-latest, python: '3.12' }
          # The desktop app is commonly run on macOS; one native lane catches
          # path, permission and process-lock behavior the Linux jobs cannot.
          - { os: macos-latest, python: '3.12' }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - name: Install backend dependencies
        run: python -m pip install --disable-pip-version-check -e . -r backend/requirements-dev.txt
      - name: Run backend tests
        run: python -m pytest backend/tests -q
      - name: Run package tests
        run: python -m pytest tests -q
      - name: Lint backend
        run: python -m ruff check backend

  python-dependency-audit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        requirements:
          - backend/requirements.txt
          - backend/requirements-scrape.txt
          - backend/requirements-ml.txt
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: ${{ matrix.requirements }}
      - name: Install audit tooling
        run: python -m pip install --disable-pip-version-check pip-audit==2.10.1
      - name: Audit ${{ matrix.requirements }}
        run: python -m pip_audit -r "${{ matrix.requirements }}" --progress-spinner off

  optional-python-installability:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { python: '3.10', requirements: backend/requirements-scrape.txt }
          - { python: '3.11', requirements: backend/requirements-scrape.txt }
          - { python: '3.12', requirements: backend/requirements-scrape.txt }
          - { python: '3.11', requirements: backend/requirements-ml.txt }
          - { python: '3.12', requirements: backend/requirements-ml.txt }
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: ${{ matrix.requirements }}
      - name: Resolve optional dependency graph
        run: >-
          python -m pip install --disable-pip-version-check --dry-run
          -r "${{ matrix.requirements }}"

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.21.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Run frontend quality gate
        working-directory: frontend
        run: pnpm run gate
      - name: Audit production frontend dependencies
        working-directory: frontend
        run: pnpm audit --prod --audit-level high
      - name: Verify committed frontend build
        run: git diff --exit-code -- frontend/dist

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Build image
        run: docker build -t prep-my-avatar-ci .
      - name: Start container
        run: >-
          docker run -d --name prep-my-avatar-ci
          -e LDS_HOST=0.0.0.0 -e LDS_PORT=5050
          -e LDS_ACCESS_TOKEN=ci-container-health-token
          -p 5050:5050 prep-my-avatar-ci
      - name: Verify health endpoint
        shell: bash
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent -H 'Authorization: Bearer ci-container-health-token' http://127.0.0.1:5050/api/health/ready; then
              exit 0
            fi
            sleep 1
          done
          docker logs prep-my-avatar-ci
          exit 1

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - name: Install backend dependencies
        run: python -m pip install --disable-pip-version-check -r backend/requirements-dev.txt
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.21.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Install browser
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium
      - name: Run browser E2E and accessibility checks
        working-directory: frontend
        run: pnpm run e2e
